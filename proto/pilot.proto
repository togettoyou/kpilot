syntax = "proto3";

package pilot.v1;

option go_package = "github.com/togettoyou/kpilot/pkg/common/proto;proto";

service PilotService {
  // Worker 主动连接 Server，建立双向流
  rpc Connect(stream WorkerMessage) returns (stream ServerMessage);
}

// ─── Worker → Server ─────────────────────────────────────────────────────────
//
// All large-payload messages (HTTPResponse body, ResourceResponse data) are
// transported as a 3-frame sequence keyed by request_id:
//
//   *Start  → small metadata frame (status, headers, success/error, ...)
//   BodyChunk → 0 or more body chunks (≤256 KiB each)
//   BodyEnd → terminator (carries body-read error if any)
//
// This guarantees no single Send call holds the stream's sendMu for more than
// a few ms, so high-priority control messages (Heartbeat, RegisterAck,
// PluginStatus, *Cancel) can always interleave between data chunks.

message WorkerMessage {
  // Empty for one-off pushes (PluginStatusPush, Heartbeat).
  // For *Start / BodyChunk / BodyEnd: routing key; receiver dispatches
  // chunks to the accumulator opened by the preceding *Start.
  // For Logs/Exec/WS: session_id (stable across all messages of the same session).
  string request_id = 1;
  oneof payload {
    RegisterRequest        register             = 10;
    HeartbeatRequest       heartbeat            = 11;
    // tag 20 reserved — was NodeListPush.
    // tag 30 reserved — was unary ResourceResponse with bytes data.
    ResourceResponseStart  resource_resp_start  = 31;
    PluginStatusPush       plugin_status        = 40;

    // Plugin install / upgrade log streaming. Worker pushes one chunk
    // per Helm log line + key reconciler milestones; PluginLogEnd
    // closes the session and carries the final outcome.
    PluginLogChunk         plugin_log           = 41;
    PluginLogEnd           plugin_log_end       = 42;

    // Streaming sessions (logs / exec)
    LogsChunk              logs_chunk           = 50;
    LogsEnd                logs_end             = 51;
    ExecOutput             exec_output          = 60;
    ExecEnd                exec_end             = 61;

    // tag 70 reserved — was unary HTTPResponse with bytes body.
    HTTPResponseStart      http_resp_start      = 71;

    // Reverse-proxy WebSocket (bidirectional streaming session).
    WSFrame                ws_frame_recv        = 80;
    WSEnd                  ws_end_recv          = 81;

    // Generic body streaming frames. Dispatched per request_id to the
    // accumulator previously opened by *Start (HTTP response body or
    // ResourceResponse data — receiver knows which from the *Start kind).
    BodyChunk              body_chunk           = 90;
    BodyEnd                body_end             = 91;
  }

  reserved 20, 30, 70;
  reserved "node_list", "resource_resp", "http_resp";
}

message RegisterRequest {
  string cluster_token  = 1;
  string worker_version = 2;
  // K8s in-cluster DNS suffix (defaults to "cluster.local" CoreDNS-style;
  // clusters with a custom kubelet --cluster-domain need this). Used by
  // Server's reverse proxy to build FQDNs for in-cluster Service URLs —
  // short ".svc" form fails when Worker pod's resolv.conf doesn't include
  // the matching search domain.
  string cluster_domain = 3;
}

message HeartbeatRequest {
  int64 timestamp = 1; // unix seconds
}

// ResourceResponseStart opens a chunked ResourceResponse — receiver collects
// subsequent BodyChunk frames into the data buffer and finalizes on BodyEnd.
// For empty responses (delete, apply-with-no-return), send Start + BodyEnd
// with zero chunks. For error responses, set error and send Start + BodyEnd
// with zero chunks.
message ResourceResponseStart {
  bool   success = 1;
  string error   = 2;
}

message PluginStatusPush {
  // The CRD metadata.name (matches the registry plugin's name).
  string crd_name             = 1;
  // Pending / Installing / Running / Upgrading / Failed / Uninstalling
  string phase                = 2;
  string message              = 3;
  // Helm release version actually installed (from chart, not the CRD spec).
  string observed_version     = 4;
  // sha256 of the values YAML actually applied — Server uses this to detect
  // drift between the registered values and what's running.
  string observed_values_hash = 5;
  int32  helm_revision        = 6;
  int64  installed_at         = 7; // unix seconds, 0 if not installed
  int64  last_updated_at      = 8; // unix seconds
}

// PluginLogChunk carries a single progress line from a running install
// / upgrade / uninstall. Emitted both by the Helm SDK's own logger and
// by reconciler milestones around it. Frontend renders these in
// real time so the user can see WHY a long-running install is stuck.
message PluginLogChunk {
  // Matches PluginStatusPush.crd_name.
  string crd_name = 1;
  // "info" / "warn" / "error". Worker classifies; frontend colorizes.
  string level    = 2;
  // Unix milliseconds when the line was generated.
  int64  ts       = 3;
  // Single line of progress text. Worker is responsible for not
  // emitting secrets / values content; helm SDK output is safe.
  string message  = 4;
}

// PluginLogEnd terminates a log session.
message PluginLogEnd {
  string crd_name = 1;
  bool   success  = 2;
  // Optional one-line summary ("installed v1.14.2 at rev 1",
  // "failed: timeout waiting for Deployment grafana"). Frontend
  // shows this in the terminal-state banner.
  string summary  = 3;
}

// ─── Server → Worker ─────────────────────────────────────────────────────────

message ServerMessage {
  string request_id = 1;
  oneof payload {
    RegisterAck            register_ack         = 10;
    // tag 20 reserved — was unary ResourceRequest with bytes body.
    ResourceRequestStart   resource_req_start   = 21;
    // tag 30 reserved — was unary PluginCommand with embedded chart blob.
    PluginCommandStart     plugin_cmd_start     = 31;

    // Streaming sessions (logs / exec)
    LogsStartRequest       logs_start           = 40;
    LogsCancelRequest      logs_cancel          = 41;
    ExecStartRequest       exec_start           = 50;
    ExecStdin              exec_stdin           = 51;
    ExecResize             exec_resize          = 52;
    ExecCancelRequest      exec_cancel          = 53;

    // tag 60 reserved — was unary HTTPRequest with bytes body.
    HTTPRequestStart       http_req_start       = 61;

    // Reverse-proxy WebSocket.
    WSStartRequest         ws_start             = 70;
    WSFrame                ws_frame_send        = 71;
    WSEnd                  ws_end_send          = 72;

    // Generic body streaming frames. Dispatched per request_id to the
    // accumulator previously opened by *Start (HTTP request body,
    // ResourceRequest body, or PluginCommand chart blob — receiver knows
    // which from the *Start kind).
    BodyChunk              body_chunk           = 90;
    BodyEnd                body_end             = 91;
  }

  reserved 20, 30, 60;
  reserved "resource_req", "plugin_cmd", "http_req";
}

message RegisterAck {
  bool   success    = 1;
  string cluster_id = 2;
  string message    = 3;
}

// ResourceRequestStart opens a chunked ResourceRequest. Same field set as the
// old ResourceRequest minus the body bytes — body (apply/update/patch JSON)
// flows in subsequent BodyChunk frames. Requests with no body (list/get/delete)
// still send BodyEnd with zero chunks to signal "ready to dispatch".
message ResourceRequestStart {
  string action    = 1; // list / get / apply / update / patch / delete / describe / list-full
  string group     = 2;
  string version   = 3;
  string kind      = 4;
  string namespace = 5; // empty = cluster-scoped
  string name      = 6; // empty for list

  // list pagination: 0 = unbounded; non-empty continue_token = next page
  int64  limit          = 7;
  string continue_token = 8;
}

// PluginCommandStart opens a PluginCommand. Chart blob (when ChartSourceMeta.
// has_blob is true) flows in subsequent BodyChunk frames; Worker collects
// + verifies sha256 + caches before dispatching.
message PluginCommandStart {
  // "enable" → install or upgrade the Helm release driven by `spec`.
  // "disable" → uninstall the release; `spec` may be nil.
  string action      = 1;

  // CRD metadata.name — matches the registry plugin's name.
  string crd_name    = 2;

  // Only meaningful when action="enable". Server fills it from the registry
  // entry merged with the per-cluster overrides (values, version, namespace).
  PluginSpec spec    = 3;
}

message PluginSpec {
  // Registry plugin id (PostgreSQL row id, for traceability — not required
  // by the reconciler, just useful in logs).
  string plugin_id         = 1;
  string display_name      = 2;
  ChartSource chart        = 3;
  string release_name      = 4; // Helm release name
  string release_namespace = 5; // Helm release namespace (created if missing)
  string values            = 6; // YAML text (kept human-readable; not JSON)
}

message ChartSource {
  // "repo" → pulled by Helm from chart_repo at install time.
  // "local" → Worker reads from /var/lib/kpilot/charts/<sha256>.tgz which is
  // populated by streaming BodyChunk frames on the FIRST PluginCommand
  // referencing this sha. Subsequent commands with cached sha skip the
  // blob (has_blob = false).
  string type    = 1;
  // type=repo
  string repo    = 2;
  string name    = 3; // chart name (both types)
  // Both types: for repo it's the Helm chart version; for local it's a
  // human-facing label (we identify the chart by sha256 internally).
  string version = 4;
  // type=local
  string sha256  = 5;
  // type=local: when true, BodyChunk + BodyEnd frames carry the .tgz bytes
  // following the PluginCommandStart. When false, Worker is expected to
  // have it cached on disk by sha256 (and will fall back to PluginStatusPush
  // "Failed: missing chart blob" if not, prompting Server to resend).
  bool   has_blob = 6;
  reserved 7;
  reserved "blob"; // was bytes blob, now streamed via BodyChunk
}

// ─── Pod Logs (streaming) ────────────────────────────────────────────────────

message LogsStartRequest {
  string namespace     = 1;
  string pod           = 2;
  string container     = 3; // empty = first/default container
  bool   follow        = 4;
  int64  tail_lines    = 5; // 0 = no tail limit
  int64  since_seconds = 6; // 0 = no time limit
  bool   previous      = 7; // logs from previous container instance
}

message LogsCancelRequest {}

message LogsChunk {
  bytes data = 1;
}

message LogsEnd {
  string error = 1; // empty = clean EOF
}

// ─── Pod Exec (bidirectional streaming) ──────────────────────────────────────

message ExecStartRequest {
  string          namespace = 1;
  string          pod       = 2;
  string          container = 3;
  repeated string command   = 4;
  bool            tty       = 5;
  uint32          cols      = 6; // initial terminal size
  uint32          rows      = 7;
}

message ExecStdin {
  bytes data = 1;
}

message ExecResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message ExecCancelRequest {}

message ExecOutput {
  uint32 stream = 1; // 1=stdout, 2=stderr
  bytes  data   = 2;
}

message ExecEnd {
  int32  exit_code = 1;
  string error     = 2;
}

// ─── HTTP reverse proxy (request-response, chunked) ──────────────────────────
//
// Both directions are 3-frame sequences:
//
//   Server → Worker:  HTTPRequestStart  + BodyChunk* + BodyEnd
//   Worker → Server:  HTTPResponseStart + BodyChunk* + BodyEnd
//
// Chunked transport keeps each Send call small (≤256 KiB) so the stream's
// sendMu releases quickly between frames, letting Heartbeat / control
// messages always interleave. Bodies that fit in one chunk still send
// Start + Chunk + End — uniform path is simpler than special-casing.

// HTTPHeader is one (Name, Value) pair. Repeated entries with the same name
// are allowed (e.g. Set-Cookie) and preserve order on the wire.
message HTTPHeader {
  string name  = 1;
  string value = 2;
}

message HTTPRequestStart {
  // HTTP method (GET / POST / PUT / DELETE / PATCH / HEAD / OPTIONS).
  string method = 1;

  // Absolute URL of the in-cluster Service the Worker should forward to.
  string url = 2;

  // Request headers (Host is rewritten by the Worker to match url's host).
  repeated HTTPHeader headers = 3;
}

message HTTPResponseStart {
  // Status code from the upstream Service. 502 if the Worker couldn't
  // reach the Service at all (DNS/connect/timeout); the `error` field
  // carries the underlying reason in that case.
  int32 status = 1;

  repeated HTTPHeader headers = 2;

  // Empty on success (any HTTP status). Set when the Worker failed to
  // dispatch the request before it could read any body bytes. When set,
  // BodyEnd follows with zero chunks.
  string error = 3;
}

// ─── Generic body streaming frames ───────────────────────────────────────────

// BodyChunk carries a slice of body bytes for any of the chunked request /
// response kinds. Receiver dispatches per request_id to the accumulator
// opened by the matching *Start. Empty data on a BodyChunk is technically
// legal but senders avoid it.
message BodyChunk {
  bytes data = 1;
}

// BodyEnd terminates a chunked body stream. error is empty on clean EOF /
// successful completion; non-empty when the sender failed partway through
// reading the upstream body (e.g. upstream connection reset mid-response).
// Receiver should surface the error to the original caller in that case.
message BodyEnd {
  string error = 1;
}

// ─── WebSocket reverse proxy (streaming session) ─────────────────────────────

message WSStartRequest {
  string url = 1;
  repeated HTTPHeader headers = 2;
}

message WSFrame {
  // RFC 6455 opcodes. We forward 1 (text), 2 (binary). Control frames
  // (close/ping/pong) are handled by the WS library on each leg.
  // Worker / Server split frames larger than wsMaxFrameBytes into multiple
  // WSFrame messages so a single Send stays small.
  int32 opcode = 1;
  bytes data   = 2;
}

message WSEnd {
  int32  code   = 1;
  string reason = 2;
}
