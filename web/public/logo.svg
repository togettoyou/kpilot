<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Dark navy backdrop with subtle gradient. Heavier than indigo→cyan
         and reads more "infra" than "consumer SaaS". -->
    <linearGradient id="bg" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Rounded backdrop -->
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#bg)"/>

  <!-- Paper plane silhouette, pointing upper-right. Composed of two
       triangular faces sharing the leading edge — the upper face is
       opaque white, the lower face slightly dimmer to suggest the
       fold. Pure pilot/navigation iconography, no letter wrestling. -->

  <!-- Upper face (catches light) -->
  <polygon points="48,138 165,52 96,108" fill="#FFFFFF"/>

  <!-- Lower face (in shadow under the fold) -->
  <polygon points="96,108 165,52 110,148" fill="#FFFFFF" fill-opacity="0.55"/>
</svg>
