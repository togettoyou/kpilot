<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 200">
  <defs>
    <linearGradient id="g" x1="20" y1="10" x2="200" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- GPU chip pins — left side -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7">
    <line x1="36" y1="72"  x2="20" y2="72"/>
    <line x1="36" y1="92"  x2="20" y2="92"/>
    <line x1="36" y1="112" x2="20" y2="112"/>
    <line x1="36" y1="132" x2="20" y2="132"/>
  </g>

  <!-- GPU chip pins — right side -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7">
    <line x1="188" y1="72"  x2="204" y2="72"/>
    <line x1="188" y1="92"  x2="204" y2="92"/>
    <line x1="188" y1="112" x2="204" y2="112"/>
    <line x1="188" y1="132" x2="204" y2="132"/>
  </g>

  <!-- Hexagon background (K8s reference) — centered in 224-wide canvas -->
  <polygon points="112,12 188,56 188,144 112,188 36,144 36,56" fill="url(#g)"/>

  <!-- Hex border highlight -->
  <polygon points="112,12 188,56 188,144 112,188 36,144 36,56"
           fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- K letterform -->
  <g stroke="white" stroke-width="19" stroke-linecap="round" fill="none">
    <line x1="84"  y1="54" x2="84"  y2="146"/>
    <line x1="84"  y1="100" x2="148" y2="54"/>
    <line x1="84"  y1="100" x2="148" y2="146"/>
  </g>

  <!-- Navigation waypoint at K junction (pilot reference) -->
  <circle cx="84" cy="100" r="10" fill="white"/>
  <circle cx="84" cy="100" r="5.5" fill="url(#g)"/>
</svg>
