## KPilot Helm chart values.
##
## The chart can deploy the Server (control plane), the Worker
## (in-cluster agent), or both in a single release. Three common
## topologies:
##
##   1. Server cluster only — managed clusters install the worker
##      themselves:
##        helm install kpilot ./chart
##      (defaults: server.enabled=true, worker.enabled=false)
##
##   2. Server + bundled local worker (single command, single
##      cluster). The chart auto-generates a shared bootstrap token
##      and points the worker at the in-cluster transport Service,
##      so the worker registers without the admin having to mint a
##      token in the UI first:
##        helm install kpilot ./chart --set worker.enabled=true
##
##   3. Worker-only for each remote managed cluster:
##        helm install kpilot-worker ./chart \
##          --set server.enabled=false,worker.enabled=true \
##          --set postgresql.enabled=false \
##          --set worker.serverAddr=<server-host>:9090 \
##          --set worker.clusterToken=<token-from-server-ui>

## ---------------------------------------------------------------------
## Global
## ---------------------------------------------------------------------
image:
  registry: ghcr.io
  repository: togettoyou/kpilot
  # imagePullPolicy applies to both server and worker images unless
  # overridden under server.image / worker.image.
  pullPolicy: IfNotPresent
  # Tag is empty here so the chart picks .Chart.AppVersion by default,
  # locking the image to the chart version. Override with --set
  # image.tag=v1.2.3 or :dev for the dev channel.
  tag: ""

imagePullSecrets: []

## Pod-level common settings — applied to both server and worker
## unless explicitly overridden under their sub-block.
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

## ---------------------------------------------------------------------
## Server (control plane)
## ---------------------------------------------------------------------
server:
  enabled: true

  image:
    # Override only when you need a different image for the server.
    # Otherwise it inherits from .image.* above and tags
    # ghcr.io/togettoyou/kpilot-server:<chart-appVersion>.
    repository: togettoyou/kpilot-server
    tag: ""

  replicaCount: 1

  ## Admin credentials. CHANGE THESE before any non-local deploy.
  admin:
    username: kpilot
    password: kpilot123

  ## JWT signing secret. Leave blank to have the chart generate a
  ## random value and store it in the rendered Secret. Restarts with
  ## a regenerated secret invalidate every issued token, so commit
  ## an explicit value in values.yaml for long-running deployments.
  jwtSecret: ""

  ## CORS allow-list. Empty list = development permissive mode.
  ## Set to the externally-facing frontend origin(s) before going
  ## public, e.g. ["https://kpilot.example.com"].
  corsOrigins: []

  ## Local-cluster bootstrap. Only meaningful when worker.enabled=true
  ## in the same release (topology #2 above). On first start the
  ## server auto-creates a cluster row matching the in-cluster
  ## worker's token, so the worker registers immediately without
  ## the admin clicking Create in the UI first. Idempotent across
  ## restarts; rotating the token in the UI takes precedence.
  localCluster:
    enabled: true
    ## Display name of the auto-created cluster row.
    name: local
    ## Bootstrap token. Leave empty so the chart generates a
    ## per-install random value cached in the server's credentials
    ## Secret (so helm upgrade keeps the same token). Override only
    ## when you have an external reason to pin a specific value.
    token: ""

  ## PostgreSQL backend.
  ## The bundled single-pod StatefulSet is gated by the top-level
  ## `postgresql.enabled` (see bottom of this file). When that is
  ## false, set `externalDsn` here.
  postgresql:
    ## externalDsn is used when the top-level postgresql.enabled is
    ## false. Standard libpq DSN, e.g.
    ##   postgres://kpilot:pw@postgres.db.svc:5432/kpilot?sslmode=require
    externalDsn: ""

  ## HTTP service (web UI + REST API)
  http:
    service:
      type: ClusterIP
      port: 80
      targetPort: 8080

  ## Transport service (Worker dial-in). One TCP+TLS connection per
  ## worker carrying multiplexed yamux streams (see
  ## docs/transport-v2.md). Expose externally so Workers in other
  ## clusters can reach the Server — typically via Service of type
  ## LoadBalancer or a TCP-passthrough L4 ingress (yamux is NOT
  ## HTTP, so HTTP-only ingress controllers won't work; use
  ## stream/TCP mode).
  transport:
    service:
      type: ClusterIP
      port: 9090
      targetPort: 9090

  ## Optional Ingress for the HTTP path. The transport service needs
  ## L4 / TCP termination (NOT HTTP) — examples in deploy/README.md.
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: kpilot.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  ## Probes hit /health on the HTTP port.
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5

## ---------------------------------------------------------------------
## Worker (in-cluster agent)
## ---------------------------------------------------------------------
worker:
  enabled: false

  image:
    repository: togettoyou/kpilot-worker
    tag: ""

  replicaCount: 1

  ## Server transport endpoint reachable from this cluster, and the
  ## ClusterToken from the Server UI's cluster row.
  ##
  ## Auto-derived when server.enabled=true is set in the same release
  ## (topology #2 in the header comment): serverAddr defaults to the
  ## in-cluster Service `<release>-server-transport.<ns>.svc:9090`
  ## and clusterToken is shared with server.localCluster.token.
  ## Override either to point at an external server.
  serverAddr: ""
  clusterToken: ""
  ## Override only when your cluster runs on a custom DNS suffix.
  ## Defaults to "cluster.local" inside the Worker if left empty.
  clusterDomain: ""

  ## DATA_DIR holds the Helm chart cache + Helm SDK working files.
  ## A PVC is created so chart pulls survive Pod restarts.
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
    accessMode: ReadWriteOnce

  ## The Worker reconciles the Plugin CRD (cluster-scoped) and
  ## installs Helm charts in arbitrary namespaces. The ClusterRole
  ## below grants what's needed for both — operators who prefer a
  ## tighter posture can disable rbac.create and bring their own.
  rbac:
    create: true
    ## Namespaces the worker is allowed to manage. Empty = all.
    ## Listed here for documentation; not yet enforced by the chart.
    namespaces: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

## ---------------------------------------------------------------------
## Bundled PostgreSQL (single-pod StatefulSet, official image).
##
## `enabled` gates the whole StatefulSet + Service + Secret block in
## templates/postgresql.yaml. Default true so a server-only install
## works out of the box.
##
## For worker-only deployments (server lives in a different cluster) set
##   --set postgresql.enabled=false
## For server deployments wanting HA / backups, set the same and fill
## in `server.postgresql.externalDsn` above with a managed instance.
## ---------------------------------------------------------------------
postgresql:
  enabled: true

  image:
    # Official upstream image (postgres:<tag>). Alpine variant for size;
    # debian-flavored tags work the same way if you'd rather.
    registry: docker.io
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  auth:
    username: kpilot
    password: kpilot123
    database: kpilot

  persistence:
    # Set to false to use an emptyDir — only safe for kind / minikube
    # smoke tests, the DB loses everything on Pod restart.
    enabled: true
    size: 8Gi
    storageClass: ""
    accessMode: ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}
