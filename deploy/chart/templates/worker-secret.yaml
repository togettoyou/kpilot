{{- if .Values.worker.enabled }}
{{- if not .Values.worker.serverAddr -}}
{{- fail "worker.enabled=true requires worker.serverAddr (Server gRPC endpoint reachable from this cluster)" -}}
{{- end -}}
{{- if not .Values.worker.clusterToken -}}
{{- fail "worker.enabled=true requires worker.clusterToken (one-time token from the Server UI)" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kpilot.workerFullname" . }}-credentials
  labels:
    {{- include "kpilot.worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  clusterToken: {{ .Values.worker.clusterToken | quote }}
{{- end }}
