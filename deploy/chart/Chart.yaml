apiVersion: v2
name: kpilot
description: |
  Unified control plane for multi-cluster Kubernetes management, GPU
  compute scheduling, and model serving. Single chart can deploy the
  KPilot Server (control plane), the KPilot Worker (in-cluster agent),
  or both. The two are decoupled via the server.enabled and
  worker.enabled toggles in values.yaml so an operator can install
  the server in one cluster and the worker in many others using the
  same chart.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - gpu
  - kubernetes
  - volcano
  - vgpu
  - model-serving
home: https://github.com/togettoyou/kpilot
sources:
  - https://github.com/togettoyou/kpilot

# PostgreSQL is shipped as an in-chart StatefulSet (see
# templates/postgresql.yaml) using the official upstream image —
# Bitnami pulled their free images from Docker Hub in 2026 leaving the
# `bitnami/postgresql` subchart broken (`ErrImagePull` on every install
# of a fresh release). Gated by `postgresql.enabled` in values.yaml.
# Operators wanting HA / backups should set `postgresql.enabled=false`
# and point `server.postgresql.externalDsn` at a managed instance.
