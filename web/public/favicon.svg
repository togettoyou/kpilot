<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Tighter padding than the full logo so the plane gets more pixels
       at favicon sizes (16-32 px). -->
  <rect x="10" y="10" width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- Same paper plane as the full logo, scaled to fill the tighter
       backdrop. -->
  <polygon points="40,150 175,42 95,113" fill="#FFFFFF"/>
  <polygon points="95,113 175,42 112,160" fill="#FFFFFF" fill-opacity="0.55"/>
</svg>
