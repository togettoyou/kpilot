{{- if .Values.server.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kpilot.serverFullname" . }}-credentials
  labels:
    {{- include "kpilot.server.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Server reads these from the environment at startup. Rotating the
  # JWT secret invalidates every issued token, so don't bump it on
  # routine chart upgrades — pin the value in values.yaml if you need
  # a deployment that survives a restart.
  adminUsername: {{ .Values.server.admin.username | quote }}
  adminPassword: {{ .Values.server.admin.password | quote }}
  jwtSecret: {{ include "kpilot.server.jwtSecret" . | quote }}
  dsn: {{ include "kpilot.server.dsn" . | quote }}
  {{- $localToken := include "kpilot.server.localClusterToken" . -}}
  {{- if $localToken }}
  # Bundled local-cluster bootstrap token. Server uses this to
  # auto-create a cluster row matching the in-cluster worker on first
  # start, eliminating the chicken-and-egg of "worker needs token,
  # token only exists after admin clicks Create in UI". The same
  # value is mirrored into worker-secret.yaml's clusterToken so the
  # two land already wired together.
  localClusterToken: {{ $localToken | quote }}
  {{- end }}
{{- end }}
