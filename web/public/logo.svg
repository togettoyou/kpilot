<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g" x1="20" y1="10" x2="180" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background (K8s reference) -->
  <polygon points="100,12 176,56 176,144 100,188 24,144 24,56" fill="url(#g)"/>

  <!-- Hex border highlight -->
  <polygon points="100,12 176,56 176,144 100,188 24,144 24,56"
           fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Circuit connector dots at hex vertices (GPU chip pin reference) -->
  <g fill="white" opacity="0.35">
    <circle cx="100" cy="12" r="3.5"/>
    <circle cx="176" cy="56" r="3.5"/>
    <circle cx="176" cy="144" r="3.5"/>
    <circle cx="100" cy="188" r="3.5"/>
    <circle cx="24"  cy="144" r="3.5"/>
    <circle cx="24"  cy="56"  r="3.5"/>
  </g>

  <!-- K letterform (stroke-based, round caps) -->
  <g stroke="white" stroke-width="19" stroke-linecap="round" fill="none">
    <line x1="72" y1="52" x2="72" y2="148"/>
    <line x1="72" y1="100" x2="136" y2="52"/>
    <line x1="72" y1="100" x2="136" y2="148"/>
  </g>

  <!-- Navigation waypoint at K junction (pilot reference) -->
  <circle cx="72" cy="100" r="10" fill="white"/>
  <circle cx="72" cy="100" r="5.5" fill="url(#g)"/>
</svg>
