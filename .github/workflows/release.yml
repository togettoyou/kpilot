name: release

# Image release pipeline.
#
# Trigger matrix:
#   - push to main           → :dev tag only (rolling unreleased build)
#   - push of a v* tag       → :<version> + :latest tags
#   - manual workflow_dispatch with `tag` input → :<input> tag
#
# Tags land on two images under the same ghcr.io org/repo prefix:
#   ghcr.io/<owner>/kpilot-server:<tag>
#   ghcr.io/<owner>/kpilot-worker:<tag>
#
# Both architectures (linux/amd64 + linux/arm64) ship in the same
# manifest list — distroless base + statically-linked Go binary means
# the cross-build cost is mostly the frontend (server image only).

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (overrides branch / tag-derived default)'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kpilot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [server, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Resolve the tag list:
      #   - workflow_dispatch input wins if provided
      #   - tag push        → vX.Y.Z + latest
      #   - branch push     → dev
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=KPilot ${{ matrix.component }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  publish-chart:
    # Packages the Helm chart and pushes it to GHCR as an OCI artifact.
    # Runs on tag releases and manual dispatches; main pushes skip this
    # step to keep the chart registry from being polluted with dev tags
    # (every commit would push a 0.0.0-<sha>-shaped version).
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Login to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # Resolve chart version:
      #   - tag push (refs/tags/vX.Y.Z) → X.Y.Z (strip the leading v)
      #   - workflow_dispatch          → input.tag (must be semver)
      - name: Compute chart version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.tag }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Package and push chart
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          helm dependency build deploy/chart
          helm package deploy/chart \
            --destination /tmp/chart \
            --version "$VERSION" \
            --app-version "$VERSION"
          helm push /tmp/chart/kpilot-"$VERSION".tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
