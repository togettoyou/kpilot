syntax = "proto3";

package pilot.v1;

option go_package = "github.com/togettoyou/kpilot/pkg/common/proto;proto";

service PilotService {
  // Worker 主动连接 Server，建立双向流
  rpc Connect(stream WorkerMessage) returns (stream ServerMessage);
}

// ─── Worker → Server ─────────────────────────────────────────────────────────

message WorkerMessage {
  // Empty for one-off pushes (NodeListPush, Heartbeat).
  // For Resource: matches the request_id of the originating ResourceRequest.
  // For Logs/Exec: session_id (stable across all messages of the same session).
  string request_id = 1;
  oneof payload {
    RegisterRequest    register        = 10;
    HeartbeatRequest   heartbeat       = 11;
    NodeListPush       node_list       = 20;
    ResourceResponse   resource_resp   = 30;
    PluginStatusPush   plugin_status   = 40;

    // Streaming sessions (logs / exec)
    LogsChunk          logs_chunk      = 50;
    LogsEnd            logs_end        = 51;
    ExecOutput         exec_output     = 60;
    ExecEnd            exec_end        = 61;

    // Reverse-proxy HTTP (request-response, body up to 32 MB).
    HTTPResponse       http_resp       = 70;

    // Reverse-proxy WebSocket (bidirectional streaming session).
    // request_id is the session id (same envelope as logs/exec).
    WSFrame            ws_frame_recv   = 80;
    WSEnd              ws_end_recv     = 81;
  }
}

message RegisterRequest {
  string cluster_token  = 1;
  string worker_version = 2;
}

message HeartbeatRequest {
  int64 timestamp = 1; // unix seconds
}

message NodeListPush {
  repeated NodeInfo nodes = 1;
}

message NodeInfo {
  string name   = 1;
  string status = 2; // Ready / NotReady / Unknown

  // 来自 node.Status.Capacity / Allocatable（millicores / bytes）
  int64 cpu_capacity        = 3;
  int64 cpu_allocatable     = 4;
  int64 memory_capacity     = 5;
  int64 memory_allocatable  = 6;

  map<string, string> labels      = 7;
  map<string, string> annotations = 8;

  // 来自 node.Status.NodeInfo
  string os_image           = 9;  // e.g. "Ubuntu 24.04.4 LTS"
  string kernel_version     = 10;
  string container_runtime  = 11; // e.g. "containerd://2.2.1"
  string kubelet_version    = 12;

  // 来自 node.Status.Addresses
  string internal_ip = 13;

  // 来自 node.Spec
  string pod_cidr = 14;
}

message ResourceResponse {
  string request_id = 1;
  bool   success    = 2;
  string error      = 3;
  bytes  data       = 4; // JSON 编码的 K8s 资源对象
}

message PluginStatusPush {
  // The CRD metadata.name (matches the registry plugin's name).
  string crd_name             = 1;
  // Pending / Installing / Running / Upgrading / Failed / Uninstalling
  string phase                = 2;
  string message              = 3;
  // Helm release version actually installed (from chart, not the CRD spec).
  string observed_version     = 4;
  // sha256 of the values YAML actually applied — Server uses this to detect
  // drift between the registered values and what's running.
  string observed_values_hash = 5;
  int32  helm_revision        = 6;
  int64  installed_at         = 7; // unix seconds, 0 if not installed
  int64  last_updated_at      = 8; // unix seconds
}

// ─── Server → Worker ─────────────────────────────────────────────────────────

message ServerMessage {
  string request_id = 1;
  oneof payload {
    RegisterAck     register_ack     = 10;
    ResourceRequest resource_req     = 20;
    PluginCommand   plugin_cmd       = 30;

    // Streaming sessions (logs / exec)
    LogsStartRequest  logs_start    = 40;
    LogsCancelRequest logs_cancel   = 41;
    ExecStartRequest  exec_start    = 50;
    ExecStdin         exec_stdin    = 51;
    ExecResize        exec_resize   = 52;
    ExecCancelRequest exec_cancel   = 53;

    // Reverse-proxy HTTP — Server forwards a browser request to an
    // in-cluster Service (Grafana, VL vmui, …); Worker writes back via
    // HTTPResponse.
    HTTPRequest       http_req      = 60;

    // Reverse-proxy WebSocket. ws_start opens the upstream dial; ws_frame
    // streams browser → upstream frames until the browser-side or upstream
    // side closes; ws_end_send is sent by Server when the browser closes.
    WSStartRequest    ws_start      = 70;
    WSFrame           ws_frame_send = 71;
    WSEnd             ws_end_send   = 72;
  }
}

message RegisterAck {
  bool   success    = 1;
  string cluster_id = 2;
  string message    = 3;
}

message ResourceRequest {
  string action    = 1; // list / get / apply / delete
  string group     = 2; // apps / "" / ...
  string version   = 3; // v1 / v1beta1 / ...
  string kind      = 4; // Deployment / Pod / Service / ...
  string namespace = 5; // 空表示 cluster-scoped
  string name      = 6; // list 时为空
  bytes  body      = 7; // apply 时为 JSON manifest

  // list 分页：0 表示不限制，非空 continue_token 表示取下一页
  int64  limit          = 8;
  string continue_token = 9;
}

message PluginCommand {
  // "enable" → install or upgrade the Helm release driven by `spec`.
  // "disable" → uninstall the release; `spec` may be nil.
  string action   = 1;

  // The CRD metadata.name — matches the registry plugin's name. Stable
  // identifier for the lifetime of the plugin on this cluster.
  string crd_name = 2;

  // Only meaningful when action="enable". Server fills it from the registry
  // entry merged with the per-cluster overrides (values, version, namespace).
  PluginSpec spec = 3;
}

message PluginSpec {
  // Registry plugin id (PostgreSQL row id, for traceability — not required
  // by the reconciler, just useful in logs).
  string plugin_id         = 1;
  string display_name      = 2;
  ChartSource chart        = 3;
  string release_name      = 4; // Helm release name
  string release_namespace = 5; // Helm release namespace (created if missing)
  string values            = 6; // YAML text (kept human-readable; not JSON)
}

message ChartSource {
  // "repo" → pulled by Helm from chart_repo at install time.
  // "local" → Worker reads from /var/lib/kpilot/charts/<sha256>.tgz which is
  // populated by the `blob` field on the FIRST PluginCommand of this sha.
  string type    = 1;
  // type=repo
  string repo    = 2;
  string name    = 3; // chart name (both types)
  // Both types: for repo it's the Helm chart version; for local it's a
  // human-facing label (we identify the chart by sha256 internally).
  string version = 4;
  // type=local
  string sha256  = 5;
  // Only present on initial enable until Worker confirms the cache hit.
  // Worker writes blob to disk by sha256 then verifies the digest.
  bytes  blob    = 6;
}

// ─── Pod Logs (streaming) ────────────────────────────────────────────────────

message LogsStartRequest {
  string namespace     = 1;
  string pod           = 2;
  string container     = 3; // empty = first/default container
  bool   follow        = 4;
  int64  tail_lines    = 5; // 0 = no tail limit
  int64  since_seconds = 6; // 0 = no time limit
  bool   previous      = 7; // logs from previous container instance
}

message LogsCancelRequest {}

message LogsChunk {
  bytes data = 1;
}

message LogsEnd {
  string error = 1; // empty = clean EOF
}

// ─── Pod Exec (bidirectional streaming) ──────────────────────────────────────

message ExecStartRequest {
  string          namespace = 1;
  string          pod       = 2;
  string          container = 3;
  repeated string command   = 4;
  bool            tty       = 5;
  uint32          cols      = 6; // initial terminal size
  uint32          rows      = 7;
}

message ExecStdin {
  bytes data = 1;
}

message ExecResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message ExecCancelRequest {}

message ExecOutput {
  uint32 stream = 1; // 1=stdout, 2=stderr
  bytes  data   = 2;
}

message ExecEnd {
  int32  exit_code = 1;
  string error     = 2;
}

// ─── HTTP reverse proxy (request-response) ───────────────────────────────────

// HTTPHeader is one (Name, Value) pair. Repeated entries with the same name
// are allowed (e.g. Set-Cookie) and preserve order on the wire.
message HTTPHeader {
  string name  = 1;
  string value = 2;
}

message HTTPRequest {
  // HTTP method (GET / POST / PUT / DELETE / PATCH / HEAD / OPTIONS).
  string method = 1;

  // Absolute URL of the in-cluster Service the Worker should forward to.
  // Server resolves this from the plugin name + the ClusterPlugin's
  // release namespace (e.g. http://grafana.kpilot-monitoring.svc:80).
  // Includes the path being requested AND the query string, e.g.
  //   http://grafana.kpilot-monitoring.svc:80/login?redirect=/d/abc
  // The Worker doesn't need to know which plugin this is — it just hits
  // the URL.
  string url = 2;

  // Request headers (Host is rewritten by the Worker to match url's host;
  // X-WEBAUTH-USER is injected by the Server before sending so Grafana's
  // auth.proxy module accepts the request).
  repeated HTTPHeader headers = 3;

  // Request body. Empty for GET/HEAD. Capped at 32 MB by the gRPC
  // message-size limit shared with chart blobs.
  bytes body = 4;
}

message HTTPResponse {
  // Status code from the upstream Service. 502 if the Worker couldn't
  // reach the Service at all (DNS/connect/timeout); the `error` field
  // carries the underlying reason in that case so Server can log it.
  int32 status = 1;

  repeated HTTPHeader headers = 2;
  bytes body = 3;

  // Empty on success (any HTTP status). Set when the Worker failed to
  // dispatch the request (couldn't dial, timeout, etc.) — Server returns
  // 502 with this message so the embedded UI shows something useful.
  string error = 4;
}

// ─── WebSocket reverse proxy (streaming session) ─────────────────────────────
//
// session_id (the envelope's request_id) ties all messages of one WS exchange
// together — same pattern as Pod logs / exec. Lifecycle:
//   Server → Worker:   WSStartRequest (open upstream dial)
//   Worker → Server:   WSEnd (carrying error)        if dial failed
//                      OR start streaming WSFrame both directions
//   Either side:       WSFrame (forward a frame)
//   Either side:       WSEnd  (clean or abnormal close)
//
// A close from one side closes the other; the gateway/manager guarantees
// the session map entry is dropped on the first WSEnd.

message WSStartRequest {
  // Absolute upstream URL. Server builds this from the same plugin →
  // Service mapping the HTTP proxy uses, with scheme rewritten to ws://.
  string url = 1;
  // Headers to replay (Origin / Sec-WebSocket-Protocol / Cookie / the
  // injected X-WEBAUTH-USER, etc.). Hop-by-hop headers + KPilot-owned
  // cookies are filtered Server-side just like the HTTP path.
  repeated HTTPHeader headers = 2;
}

message WSFrame {
  // RFC 6455 opcodes that we forward as-is to the other side.
  // We only care about 1 (text), 2 (binary). Control frames (close/
  // ping/pong) are handled by the WS library on each leg, not forwarded.
  int32 opcode = 1;
  bytes data   = 2;
}

message WSEnd {
  // RFC 6455 close code, e.g. 1000 (Normal), 1006 (Abnormal). 0 if the
  // close was triggered by the local side (transport / context cancel)
  // before the peer sent a close frame.
  int32  code   = 1;
  string reason = 2;
}
