{{- if .Values.worker.enabled }}
{{- $addr := include "kpilot.worker.serverAddr" . -}}
{{- $token := include "kpilot.worker.clusterToken" . -}}
{{- if not $addr -}}
{{- fail "worker.enabled=true requires worker.serverAddr (Server gRPC endpoint reachable from this cluster), or set server.enabled=true in the same release for auto-wiring" -}}
{{- end -}}
{{- if not $token -}}
{{- fail "worker.enabled=true requires worker.clusterToken (one-time token from the Server UI), or set server.enabled=true + server.localCluster.enabled=true in the same release for auto-wiring" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kpilot.workerFullname" . }}-credentials
  labels:
    {{- include "kpilot.worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Token is either operator-supplied via worker.clusterToken or
  # auto-derived from the bundled server's local-cluster bootstrap
  # token. See _helpers.tpl::kpilot.worker.clusterToken.
  clusterToken: {{ $token | quote }}
{{- end }}
