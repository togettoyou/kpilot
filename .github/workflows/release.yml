name: release

# Image release pipeline.
#
# Trigger matrix:
#   - push to main           → :dev tag only (rolling unreleased build)
#   - push of a v* tag       → :<version> + :latest tags
#   - manual workflow_dispatch with `tag` input → :<input> tag
#
# Tags land on two images under the same ghcr.io org/repo prefix:
#   ghcr.io/<owner>/kpilot-server:<tag>
#   ghcr.io/<owner>/kpilot-worker:<tag>
#
# Both architectures (linux/amd64 + linux/arm64) ship in the same
# manifest list — distroless base + statically-linked Go binary means
# the cross-build cost is mostly the frontend (server image only).

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (overrides branch / tag-derived default)'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kpilot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      # default fail-fast=true: if the server image fails, cancel the
      # in-flight worker build instead of burning the rest of the
      # billing minutes on a doomed pipeline.
      matrix:
        component: [server, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Resolve the tag list:
      #   - workflow_dispatch input wins if provided
      #   - tag push        → vX.Y.Z + latest
      #   - branch push     → dev
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=KPilot ${{ matrix.component }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  publish-chart:
    # Packages the Helm chart and pushes it to GHCR as an OCI artifact.
    # Always runs after the image build:
    #   - main push          → 0.0.0-dev   (rolling pre-release, app=dev)
    #   - v* tag push        → X.Y.Z       (matching the tag, app=X.Y.Z)
    #   - workflow_dispatch  → inputs.tag  (operator-supplied semver)
    # The 0.0.0-dev tag overwrites in place each main push, mirroring
    # how the :dev image tag floats — operators can `helm install
    # --version 0.0.0-dev` to test against the latest unreleased build.
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Login to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # Resolve chart + app version pair:
      #   tag push        → chart=X.Y.Z,    app=X.Y.Z
      #   main push       → chart=0.0.0-dev, app=dev
      #   workflow_dispatch → chart=inputs.tag, app=inputs.tag
      - name: Compute chart version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.tag }}"; app="$v"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"; app="$v"
          else
            # main branch — 0.0.0-dev is a valid semver pre-release; the
            # chart points at the :dev image via app-version=dev.
            v="0.0.0-dev"; app="dev"
          fi
          echo "version=$v"   >> "$GITHUB_OUTPUT"
          echo "appVersion=$app" >> "$GITHUB_OUTPUT"

      - name: Package and push chart
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          APP_VERSION: ${{ steps.ver.outputs.appVersion }}
        run: |
          helm dependency build deploy/chart
          helm package deploy/chart \
            --destination /tmp/chart \
            --version "$VERSION" \
            --app-version "$APP_VERSION"
          helm push /tmp/chart/kpilot-"$VERSION".tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
