{{- /*
Two ConfigMaps copied verbatim from the upstream volcano-vgpu-device-
plugin manifest (volcano-vgpu-device-plugin/volcano-vgpu-device-plugin.yml).

  - volcano-vgpu-device-config: tells the plugin how to advertise vGPU
    resources to kubelet (resource names + per-GPU split count) and
    declares MIG geometries for A30 / A100 family cards. We keep the
    upstream defaults so MIG-mode geometries match Project-HAMi
    documentation; users who want non-default values override via the
    Enable drawer (ClusterPlugin.values_override).

  - volcano-vgpu-node-config: per-node operating-mode overrides. The
    upstream YAML ships a single example entry (`aio-node67`) — users
    edit this map to apply node-specific scaling overrides. KPilot
    leaves it empty-but-present so the DaemonSet doesn't crash-loop
    looking for the configmap.

Both resources use Helm's release namespace; the upstream YAML hard-
codes `kube-system` but Helm respects --namespace at install time.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: volcano-vgpu-device-config
  labels:
    app.kubernetes.io/component: volcano-vgpu-device-plugin
    {{- include "volcano-vgpu.labels" . | nindent 4 }}
data:
  device-config.yaml: |-
    nvidia:
      resourceCountName: volcano.sh/vgpu-number
      resourceMemoryName: volcano.sh/vgpu-memory
      resourceMemoryPercentageName: volcano.sh/vgpu-memory-percentage
      resourceCoreName: volcano.sh/vgpu-cores
      overwriteEnv: false
      defaultMemory: 0
      defaultCores: 0
      defaultGPUNum: 1
      deviceSplitCount: {{ .Values.deviceSplitCount }}
      deviceMemoryScaling: 1
      deviceCoreScaling: 1
      gpuMemoryFactor: 1
      knownMigGeometries:
      - models: [ "A30" ]
        allowedGeometries:
          - group: group1
            geometries:
            - name: 1g.6gb
              memory: 6144
              count: 4
          - group: group2
            geometries:
            - name: 2g.12gb
              memory: 12288
              count: 2
          - group: group3
            geometries:
            - name: 4g.24gb
              memory: 24576
              count: 1
      - models: [ "A100-SXM4-40GB", "A100-40GB-PCIe", "A100-PCIE-40GB", "A100-SXM4-40GB" ]
        allowedGeometries:
          - group: "group1"
            geometries:
            - name: 1g.5gb
              memory: 5120
              count: 7
          - group: "group2"
            geometries:
            - name: 2g.10gb
              memory: 10240
              count: 3
            - name: 1g.5gb
              memory: 5120
              count: 1
          - group: "group3"
            geometries:
            - name: 3g.20gb
              memory: 20480
              count: 2
          - group: "group4"
            geometries:
            - name: 7g.40gb
              memory: 40960
              count: 1
      - models: [ "A100-SXM4-80GB", "A100-80GB-PCIe", "A100-PCIE-80GB"]
        allowedGeometries:
          - group: "group1"
            geometries:
            - name: 1g.10gb
              memory: 9728
              count: 7
          - group: "group2"
            geometries:
            - name: 2g.20gb
              memory: 19968
              count: 3
            - name: 1g.10gb
              memory: 9728
              count: 1
          - group: "group3"
            geometries:
            - name: 3g.40gb
              memory: 40192
              count: 2
          - group: "group4"
            geometries:
            - name: 7g.80gb
              memory: 80896
              count: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: volcano-vgpu-node-config
  labels:
    app.kubernetes.io/component: volcano-vgpu-node-plugin
    {{- include "volcano-vgpu.labels" . | nindent 4 }}
data:
  # Per-node override map. Empty default — users edit this entry on
  # the Enable drawer when a specific node needs a non-default
  # devicememoryscaling / devicesplitcount / migstrategy. Without
  # this configmap present the DaemonSet still runs (mounts it as
  # optional via the volume below), so leaving the list empty is OK.
  config.json: |
    {
        "nodeconfig": []
    }
