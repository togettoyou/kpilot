{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kpilot.workerFullname" . }}
  labels:
    {{- include "kpilot.worker.labels" . | nindent 4 }}
spec:
  # Worker is a singleton per cluster — only one connection per
  # ClusterToken is accepted by the Server. Running multiple replicas
  # would have all-but-one rejected with "another worker is already
  # connected for this cluster".
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kpilot.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kpilot.worker.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/worker-secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "kpilot.workerFullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "kpilot.worker.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            # Worker writes to DATA_DIR — root filesystem stays
            # read-only, the writable Helm cache lives on the PVC.
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: SERVER_ADDR
              value: {{ .Values.worker.serverAddr | quote }}
            - name: CLUSTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kpilot.workerFullname" . }}-credentials
                  key: clusterToken
            - name: DATA_DIR
              value: /var/lib/kpilot
            {{- with .Values.worker.clusterDomain }}
            - name: CLUSTER_DOMAIN
              value: {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/kpilot
            # /tmp is writable scratch for Helm SDK chart extraction
            # + temp file dance. Root filesystem stays read-only; only
            # this tmpfs gets RW.
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: data
        {{- if .Values.worker.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kpilot.workerFullname" . }}-data
        {{- else }}
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
